name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  php-tests:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["7.4", "8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none

      - name: Validate PHP syntax
        run: |
          find modules templates tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Install PHPUnit
        run: |
          wget -q -O phpunit.phar https://phar.phpunit.de/phpunit-9.phar
          php phpunit.phar --version

      - name: Run test suite
        run: php phpunit.phar -c phpunit.xml.dist

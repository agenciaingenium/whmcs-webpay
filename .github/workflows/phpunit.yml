name: PHP Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Download PHPUnit
        run: |
          wget -q https://phar.phpunit.de/phpunit-9.6.20.phar -O phpunit
          chmod +x phpunit

      - name: Run unit and integration tests
        run: php ./phpunit -c phpunit.xml.dist
